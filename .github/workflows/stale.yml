---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Stale

on:
  schedule:
    - cron: '0 8 * * *' # Every day at 08:00
  workflow_call:
  workflow_dispatch:

permissions: {}

jobs:
  stale:
    name: 🧹 Clean up stale issues and PRs
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: ivuorinen/actions/stale@459781a253d1c53960506b124ae3beaa1090e2a3 # v2026.03.22
